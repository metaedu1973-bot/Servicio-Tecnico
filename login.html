<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#1565c0,#42a5f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid gray;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

img{
margin-bottom:10px;
}

hr{
margin:25px 0;
}

</style>

</head>

<body>

<div class="login">

<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png"
width="100">

<h2>🔐 Iniciar Sesión</h2>

<input type="email"
id="usuario"
placeholder="Correo Electrónico">

<input type="password"
id="clave"
placeholder="Contraseña">

<button onclick="entrar()">
Ingresar
</button>

<hr>

<h3>👨‍🔧 Crear Técnico</h3>

<input type="email"
id="nuevoUsuario"
placeholder="Correo Nuevo Técnico">

<input type="password"
id="nuevaClave"
placeholder="Contraseña">

<button onclick="crearUsuario()">
Crear Técnico
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDILlEvHJ05IUg146N17zVwGG5RD7X50Y4",

authDomain: "servicio-tecnico-8a5ef.firebaseapp.com",

databaseURL: "https://servicio-tecnico-8a5ef-default-rtdb.firebaseio.com",

projectId: "servicio-tecnico-8a5ef",

storageBucket: "servicio-tecnico-8a5ef.firebasestorage.app",

messagingSenderId: "895895342548",

appId: "1:895895342548:web:c400eb7e17ff78f57c1a41",

measurementId: "G-HTXDTJ735G"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.entrar = function(){

let email =
document.getElementById("usuario").value;

let password =
document.getElementById("clave").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

if(email=="admin@servicio.com"){

localStorage.setItem("rol","admin");

}else{

localStorage.setItem("rol","tecnico");

}

window.location="index.html";

})

.catch((error)=>{

alert(error.message);

});

}

window.crearUsuario = function(){

let email =
document.getElementById("nuevoUsuario").value;

let password =
document.getElementById("nuevaClave").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

localStorage.setItem("rol","tecnico");

window.location="index.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
