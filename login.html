<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{

font-family:Arial;
background:linear-gradient(to right,#1565c0,#42a5f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.login{

background:white;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;

}

input{

width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid gray;

}

button{

padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="login">

<h2>🔐 Iniciar Sesión</h2>

<input type="text" id="usuario" placeholder="Usuario">

<input type="password" id="clave" placeholder="Contraseña">

<button onclick="entrar()">
Ingresar
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDILlEvHJ05IUg146N17zVwGG5RD7X50Y4",
  authDomain: "servicio-tecnico-8a5ef.firebaseapp.com",
  databaseURL: "https://servicio-tecnico-8a5ef-default-rtdb.firebaseio.com",
  projectId: "servicio-tecnico-8a5ef",
  storageBucket: "servicio-tecnico-8a5ef.firebasestorage.app",
  messagingSenderId: "895895342548",
  appId: "1:895895342548:web:c400eb7e17ff78f57c1a41",
  measurementId: "G-HTXDTJ735G"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.entrar = function(){

let email =
document.getElementById("usuario").value;

let password =
document.getElementById("clave").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

window.location="index.html";

})

.catch(()=>{

alert("Correo o contraseña incorrectos");

});

}

</script>

</body>
</html>
