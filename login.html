<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{

font-family:Arial;
background:linear-gradient(to right,#1565c0,#42a5f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;

}

.login{

background:white;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0px 5px 20px rgba(0,0,0,0.3);

}

input,select{

width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;

}

button{

padding:12px 20px;
background:linear-gradient(to bottom,#00b300,#008000);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:bold;
box-shadow:0px 5px 0px #006600;

}

button:active{

transform:translateY(4px);
box-shadow:0px 1px 0px #006600;

}

hr{

margin:25px 0;

}

</style>

</head>

<body>

<div class="login">

<h2>🔐 Iniciar Sesión</h2>

<input type="email"
id="usuario"
placeholder="Correo">

<input type="password"
id="clave"
placeholder="Contraseña">

<button onclick="entrar()">
Ingresar
</button>

<hr>

<h3>👨‍🔧 Crear Usuario</h3>

<input type="email"
id="nuevoUsuario"
placeholder="Correo">

<input type="password"
id="nuevaClave"
placeholder="Contraseña">

<select id="rolUsuario">

<option value="tecnico">
👨‍🔧 Técnico
</option>

<option value="admin">
👑 Admin
</option>

</select>

<button onclick="crearUsuario()">
Crear Usuario
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

getDatabase,
ref,
push,
onValue

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyDILlEvHJ05IUg146N17zVwGG5RD7X50Y4",

authDomain: "servicio-tecnico-8a5ef.firebaseapp.com",

databaseURL: "https://servicio-tecnico-8a5ef-default-rtdb.firebaseio.com",

projectId: "servicio-tecnico-8a5ef",

storageBucket: "servicio-tecnico-8a5ef.firebasestorage.app",

messagingSenderId: "895895342548",

appId: "1:895895342548:web:c400eb7e17ff78f57c1a41",

measurementId: "G-HTXDTJ735G"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

window.entrar = function(){

let email =
document.getElementById("usuario").value;

let password =
document.getElementById("clave").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

const usuariosRef =
ref(db,"usuarios");

onValue(usuariosRef,(snapshot)=>{

let datos = snapshot.val();

for(let id in datos){

let u = datos[id];

if(u.email==email){

if(u.estado=="bloqueado"){

alert("Usuario bloqueado");

return;

}

localStorage.setItem("rol",u.rol);

window.location="index.html";

}

}

});

})

.catch((error)=>{

alert(error.message);

});

}

window.crearUsuario = function(){

let email =
document.getElementById("nuevoUsuario").value;

let password =
document.getElementById("nuevaClave").value;

let rol =
document.getElementById("rolUsuario").value;

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

push(ref(db,"usuarios"),{

email: email,

rol: rol,

estado: "activo"

});

alert("Usuario creado correctamente");

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
