<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Sistema Técnico</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#1565c0,#42a5f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login{
background:white;
padding:35px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

h2{
margin-top:0;
color:#1565c0;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#0a8f08;
color:white;
border:none;
border-radius:10px;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
color:#1565c0;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login">

<h2>🔐 Sistema Técnico CNE</h2>

<input type="email" id="usuario" placeholder="Correo">

<input type="password" id="clave" placeholder="Contraseña">

<button onclick="entrar()">
Ingresar
</button>

<a href="#" onclick="recuperarClave()">
¿Olvidaste tu contraseña?
</a>

<hr>

<h3>👨‍🔧 Crear Usuario</h3>

<input type="email" id="nuevoUsuario" placeholder="Correo nuevo">

<input
type="password"
id="nuevaClave"
placeholder="Contraseña nueva">

<p style="
font-size:13px;
color:gray;
margin-top:5px;
">

🔒 Mínimo 6 caracteres

</p>

<button onclick="crearUsuario()">
Crear Usuario
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDILlEvHJ05IUg146N17zVwGG5RD7X50Y4",

authDomain: "servicio-tecnico-8a5ef.firebaseapp.com",

databaseURL: "https://servicio-tecnico-8a5ef-default-rtdb.firebaseio.com",

projectId: "servicio-tecnico-8a5ef",

storageBucket: "servicio-tecnico-8a5ef.firebasestorage.app",

messagingSenderId: "895895342548",

appId: "1:895895342548:web:c400eb7e17ff78f57c1a41"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.entrar = function(){

let email =
document.getElementById("usuario").value;

let password =
document.getElementById("clave").value;
  if(password.length < 6){

alert(
"⚠️ La contraseña debe tener mínimo 6 caracteres"
);

return;

}

signInWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

localStorage.setItem(
"rol",
email=="metaedu1973@gmail.com"
?
"admin"
:
"tecnico"
);

localStorage.setItem(
"tecnico",
email
);

localStorage.setItem(
"usuarioActivo",
email
);

localStorage.setItem(
"tecnico",
email
);
  
window.location =
"index.html";

})

.catch((error)=>{

alert(error.message);

});

}

window.crearUsuario = function(){

let email =
document.getElementById("nuevoUsuario").value;

let password =
document.getElementById("nuevaClave").value;

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

alert("Usuario creado");

})

.catch((error)=>{

alert(error.message);

});

}

window.recuperarClave = function(){

let email =
document.getElementById("usuario").value;

if(email==""){

alert("Ingrese su correo primero");

return;

}

sendPasswordResetEmail(
auth,
email
)

.then(()=>{

alert("Correo de recuperación enviado");

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
