<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Crear Técnicos</title>

<style>

body{

font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:30px;

}

input{

width:300px;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid gray;

}

button{

padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

</style>

</head>

<body>

<h1>👨‍🔧 Crear Técnico</h1>

<input type="email" id="correo" placeholder="Correo">

<input type="password" id="clave" placeholder="Contraseña">

<br>

<button onclick="crear()">
Crear Usuario
</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDILlEvHJ05IUg146N17zVwGG5RD7X50Y4",
  authDomain: "servicio-tecnico-8a5ef.firebaseapp.com",
  databaseURL: "https://servicio-tecnico-8a5ef-default-rtdb.firebaseio.com",
  projectId: "servicio-tecnico-8a5ef",
  storageBucket: "servicio-tecnico-8a5ef.firebasestorage.app",
  messagingSenderId: "895895342548",
  appId: "1:895895342548:web:c400eb7e17ff78f57c1a41",
  measurementId: "G-HTXDTJ735G"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.crear = function(){

let email =
document.getElementById("correo").value;

let password =
document.getElementById("clave").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Técnico creado correctamente");

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
