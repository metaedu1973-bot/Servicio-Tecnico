<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Sistema Técnico</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<header>

<h1>🛠️ SISTEMA DE SERVICIO TÉCNICO</h1>

<button onclick="cerrarSesion()">
Cerrar Sesión
</button>

</header>

<div class="dashboard">

<div class="card-dashboard">
<h2 id="totalEquipos">0</h2>
<p>Equipos</p>
</div>

<div class="card-dashboard">
<h2 id="totalMantenimientos">0</h2>
<p>Mantenimientos</p>
</div>

</div>

<div class="contenedor">

<h2>📋 Registro Técnico</h2>

<div class="formulario">

<input type="text" id="area" placeholder="Área">
<input type="text" id="equipo" placeholder="Equipo">
<input type="text" id="servicio" placeholder="Servicio">
<input type="text" id="modelo" placeholder="Modelo">
<input type="text" id="marca" placeholder="Marca">
<input type="text" id="serie" placeholder="Serie">
<input type="text" id="codigo" placeholder="Código">
<input type="text" id="disco" placeholder="Disco Duro">
<input type="text" id="memoria" placeholder="Memoria RAM">
<input type="text" id="monitor" placeholder="Monitor">
<input type="text" id="teclado" placeholder="Teclado">
<input type="text" id="mouse" placeholder="Mouse">
<input type="text" id="impresora" placeholder="Impresora">
<input type="text" id="telefono" placeholder="Teléfono">
<input type="text" id="antivirus" placeholder="Antivirus">
<input type="text" id="mantenimiento" placeholder="Mantenimiento">
<input type="text" id="tecnico" placeholder="Técnico Responsable">

<input type="file"
id="foto"
accept="image/*"
capture="environment">

<button onclick="guardar()">
💾 Guardar Registro
</button>

</div>

<div class="acciones">

<button onclick="exportarExcel()">
📊 Exportar Excel
</button>

<button onclick="generarPDF()">
📄 Generar PDF
</button>

</div>

<input type="text"
id="buscar"
placeholder="🔍 Buscar equipo..."
onkeyup="buscarEquipo()">

<div id="lista"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
